---
layout: default
---

<article>
  <header class="mb-4">
    <h1>{{ page.title }}</h1>
    <p class="text-muted">
      <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      {% if page.author %}&mdash; {{ page.author }}{% endif %}
    </p>
    {% if page.categories.size > 0 %}
    <p>
      {% for cat in page.categories %}
      <span class="badge badge-secondary">{{ cat }}</span>
      {% endfor %}
    </p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <hr>
  <p><a href="{{ '/' | relative_url }}">&larr; Back</a></p>
</article>
