<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>{% if page.title %}{{ page.title }} &mdash; {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
  <link rel="stylesheet" href="{{ '/assets/css/bootstrap.min.css' | relative_url }}">
  <style>
    @font-face {
      font-family: "DOS";
      src: url("{{ '/assets/fonts/Fixedsys500c.woff' | relative_url }}") format("woff"),
           url("{{ '/assets/fonts/Fixedsys500c.otf' | relative_url }}") format("opentype");
    }
  </style>
  {% seo %}
</head>
<body>

  <nav class="navbar navbar-expand-md navbar-dark bg-dark border-bottom border-secondary">
    <a class="navbar-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav mr-auto">
        <li class="nav-item{% if page.url == '/' %} active{% endif %}">
          <a class="nav-link" href="{{ '/' | relative_url }}">Home</a>
        </li>
        <li class="nav-item{% if page.url contains '/about' %} active{% endif %}">
          <a class="nav-link" href="{{ '/about/' | relative_url }}">About</a>
        </li>
      </ul>
    </div>
  </nav>

  <div class="container mt-4">
    {{ content }}
  </div>

  <footer class="border-top border-secondary mt-5 py-3">
    <div class="container">
      <small class="text-muted">
        &copy; {{ site.time | date: '%Y' }} {{ site.author }} &mdash;
        <a href="{{ site.url }}{{ site.baseurl }}">{{ site.title }}</a>
      </small>
    </div>
  </footer>

  <script src="{{ '/assets/js/bootstrap.bundle.js' | relative_url }}"></script>
</body>
</html>
